<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <title>掃碼進出庫存管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
      defer
    ></script>
    <script
      src="https://unpkg.com/@zxing/browser@0.1.5"
      defer
    ></script>
    <style>
      :root {
        --bg: #f4eee4;
        --surface: rgba(255, 249, 241, 0.92);
        --surface-strong: rgba(255, 248, 237, 0.98);
        --ink: #13212f;
        --muted: #5b6a79;
        --line: rgba(19, 33, 47, 0.1);
        --accent: #ee6c3b;
        --success: #1f8f66;
        --warning: #bf7c17;
        --error: #bf394d;
        --scanner: #0e141b;
        --shadow: 0 20px 60px rgba(19, 33, 47, 0.15);
        --radius-xl: 28px;
        --radius-md: 18px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 34%),
          linear-gradient(180deg, #f7f1e8 0%, #efe6d6 100%);
        color: var(--ink);
        font-family: 'Manrope', 'Noto Sans TC', sans-serif;
      }

      body {
        min-height: 100svh;
      }

      button,
      input {
        font: inherit;
        touch-action: manipulation;
      }

      .app-shell {
        width: 100%;
        min-height: 100svh;
        padding:
          max(18px, env(safe-area-inset-top))
          16px
          max(24px, env(safe-area-inset-bottom))
          16px;
      }

      .app-frame {
        width: min(100%, 540px);
        margin: 0 auto;
      }

      .main-card {
        padding: 18px;
        border-radius: var(--radius-xl);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 247, 237, 0.88)),
          rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.48);
      }

      .brand-row {
        margin-bottom: 18px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 5vw, 2.35rem);
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }

      .primary-button,
      .save-button,
      .stepper-button,
      .ghost-button {
        border: 0;
        border-radius: var(--radius-md);
        font-weight: 800;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease, box-shadow 140ms ease;
      }

      .primary-button,
      .save-button {
        min-height: 60px;
        padding: 0 18px;
        font-size: 1rem;
      }

      .primary-button {
        background: linear-gradient(135deg, #152130 0%, #24354d 100%);
        color: #fff8ef;
        box-shadow: 0 18px 28px rgba(21, 33, 48, 0.24);
      }

      .save-button {
        background: linear-gradient(135deg, #ff8a4c 0%, #ee6c3b 100%);
        color: #fff8ef;
        box-shadow: 0 18px 28px rgba(238, 108, 59, 0.28);
      }

      .primary-button:disabled,
      .save-button:disabled {
        opacity: 0.42;
        cursor: not-allowed;
        box-shadow: none;
      }

      .field-stack {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 0.92rem;
        font-weight: 800;
      }

      .field-hint,
      .status-line,
      .timestamp-line,
      .quantity-delta {
        color: var(--muted);
        line-height: 1.55;
      }

      .field-hint {
        font-size: 0.78rem;
        font-weight: 600;
      }

      .text-input,
      .quantity-input {
        width: 100%;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        background: var(--surface-strong);
        color: var(--ink);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .text-input {
        min-height: 60px;
        padding: 0 18px;
        font-size: 1rem;
        font-weight: 700;
      }

      .text-input:focus,
      .quantity-input:focus {
        outline: none;
        box-shadow:
          inset 0 0 0 1px rgba(238, 108, 59, 0.52),
          0 0 0 5px rgba(238, 108, 59, 0.12);
      }

      .quantity-panel {
        display: grid;
        grid-template-columns: 70px 1fr 70px;
        gap: 10px;
        align-items: center;
      }

      .stepper-button {
        min-height: 64px;
        background: #162130;
        color: #fff8ef;
        font-size: 1.85rem;
        box-shadow: 0 14px 30px rgba(22, 33, 48, 0.2);
      }

      .quantity-input {
        min-height: 64px;
        padding: 0 18px;
        text-align: center;
        font-size: 1.8rem;
        font-weight: 800;
      }

      .quantity-delta {
        font-size: 0.86rem;
        font-weight: 800;
      }

      .quantity-delta[data-tone='success'] {
        color: var(--success);
      }

      .quantity-delta[data-tone='warning'] {
        color: var(--warning);
      }

      .status-strip {
        display: grid;
        gap: 8px;
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.68);
      }

      .status-line {
        font-size: 0.92rem;
        font-weight: 700;
      }

      .status-line[data-tone='success'] {
        color: var(--success);
      }

      .status-line[data-tone='warning'] {
        color: var(--warning);
      }

      .status-line[data-tone='error'] {
        color: var(--error);
      }

      .timestamp-line {
        font-size: 0.82rem;
        font-weight: 700;
      }

      .scanner-modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding:
          max(18px, env(safe-area-inset-top))
          16px
          max(24px, env(safe-area-inset-bottom))
          16px;
        background: rgba(14, 20, 27, 0.78);
        backdrop-filter: blur(10px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .scanner-modal.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .scanner-dialog {
        width: min(100%, 540px);
        padding: 18px;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(19, 33, 47, 0.96), rgba(8, 12, 18, 0.96));
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.36);
        color: #fff8ef;
      }

      .scanner-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .scanner-title {
        font-size: 1rem;
        font-weight: 800;
      }

      .ghost-button {
        min-height: 46px;
        padding: 0 16px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff8ef;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .scanner-shell {
        position: relative;
        overflow: hidden;
        min-height: 320px;
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.12)),
          var(--scanner);
      }

      .scanner-shell::before {
        content: '';
        position: absolute;
        inset: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        pointer-events: none;
      }

      .scanner-shell::after {
        content: '';
        position: absolute;
        left: 12%;
        right: 12%;
        top: 28%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #f9a870, transparent);
        box-shadow: 0 0 18px rgba(249, 168, 112, 0.72);
        animation: scanline 2.4s linear infinite;
        opacity: 0;
        transition: opacity 200ms ease;
      }

      .scanner-shell.is-active::after {
        opacity: 1;
      }

      @keyframes scanline {
        0% { transform: translateY(0); }
        50% { transform: translateY(160px); }
        100% { transform: translateY(0); }
      }

      #reader {
        min-height: 320px;
      }

      #reader video {
        width: 100%;
        min-height: 320px;
        object-fit: cover;
        border-radius: 24px;
      }

      .scanner-guide {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(68%, 248px);
        height: 76px;
        transform: translate(-50%, -50%);
        border-radius: 20px;
        box-shadow:
          inset 0 0 0 2px rgba(255, 248, 239, 0.78),
          0 0 0 999px rgba(14, 20, 27, 0.14);
        pointer-events: none;
      }

      .scanner-guide::before,
      .scanner-guide::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 20px;
        pointer-events: none;
      }

      .scanner-guide::before {
        border: 3px solid rgba(249, 168, 112, 0.88);
        mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        padding: 12px;
        mask-composite: exclude;
        -webkit-mask-composite: xor;
      }

      .scanner-guide::after {
        inset: 10px 14px;
        border-top: 2px solid rgba(255, 248, 239, 0.62);
        border-bottom: 2px solid rgba(255, 248, 239, 0.62);
      }

      .scanner-placeholder {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: rgba(255, 248, 239, 0.78);
        text-align: center;
        font-size: 0.95rem;
        line-height: 1.7;
        pointer-events: none;
      }

      .scanner-shell.is-active .scanner-placeholder {
        opacity: 0;
      }

      .scanner-note {
        margin-top: 12px;
        color: rgba(255, 248, 239, 0.78);
        font-size: 0.84rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="app-frame">
        <section class="main-card">
          <div class="brand-row">
            <h1>掃碼進出庫存管理</h1>
          </div>

          <div class="topbar">
            <button id="scanButton" class="primary-button" type="button" disabled>開啟掃描</button>
            <button id="saveButton" class="save-button" type="button" disabled>儲存變更</button>
          </div>

          <div class="field-stack">
            <label class="field">
              <span class="field-label">商品名稱</span>
              <input
                id="productName"
                class="text-input"
                type="text"
                autocomplete="off"
                placeholder="輸入商品名稱"
              />
            </label>

            <div class="field">
              <span class="field-label">庫存數量</span>
              <div class="quantity-panel">
                <button id="minusButton" class="stepper-button" type="button" aria-label="減少數量">−</button>
                <input
                  id="quantity"
                  class="quantity-input"
                  type="number"
                  min="0"
                  inputmode="numeric"
                  placeholder="0"
                />
                <button id="plusButton" class="stepper-button" type="button" aria-label="增加數量">+</button>
              </div>
              <p id="quantityDelta" class="quantity-delta" data-tone="info">本次未變動數量</p>
            </div>

            <label class="field">
              <span class="field-label">
                <span>條碼 Barcode</span>
                <span class="field-hint">手動輸入後按 Enter 可即時比對</span>
              </span>
              <input
                id="barcode"
                class="text-input"
                type="text"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
                inputmode="text"
                placeholder="可手動輸入，例如 1234567890-1"
              />
            </label>
          </div>

          <div class="status-strip">
            <p id="statusMessage" class="status-line" data-tone="info">正在連線資料來源...</p>
            <p id="timestampValue" class="timestamp-line">最後時間戳：未記錄</p>
          </div>
        </section>
      </div>
    </div>

    <div id="scannerModal" class="scanner-modal" aria-hidden="true">
      <div class="scanner-dialog" role="dialog" aria-modal="true" aria-labelledby="scannerTitle">
        <div class="scanner-head">
          <div>
            <p class="scanner-title" id="scannerTitle">即時掃描</p>
          </div>
          <button id="closeScannerButton" class="ghost-button" type="button">關閉</button>
        </div>

        <div id="scannerShell" class="scanner-shell">
          <div id="reader"></div>
          <div class="scanner-guide" aria-hidden="true"></div>
          <div class="scanner-placeholder">請將條碼主動對齊中央框線。辨識成功會自動關閉掃描視窗。</div>
        </div>

        <p id="scannerNote" class="scanner-note">正在準備掃描器...</p>
      </div>
    </div>

    <script>
      const GAS_WEB_APP_URL =
        'https://script.google.com/macros/s/AKfycbzIrzowR2-_4CTUp_9qy1CLrDI3bDovH6SMgSvhzAHz5QNnTFvvPpGSIKknEYsY3GmszQ/exec';

      const state = {
        apiReady: false,
        original: createRecord(),
        current: createRecord(),
        saving: false,
        scannerOpen: false,
        scannerRunning: false,
        scannerTransitioning: false,
        scannerHandlingResult: false,
        scannerEngine: '',
        scannerInstance: null,
        nativeDetector: null,
        nativeStream: null,
        nativeVideo: null,
        nativeCanvas: null,
        nativeContext: null,
        nativeDetecting: false,
        nativeScanFrame: 0,
        audioContext: null,
        audioGainNode: null,
        zxingReader: null,
        zxingControls: null,
        lastScannedCode: '',
        lastScanAt: 0
      };

      const dom = {
        scanButton: document.getElementById('scanButton'),
        saveButton: document.getElementById('saveButton'),
        productName: document.getElementById('productName'),
        quantity: document.getElementById('quantity'),
        quantityDelta: document.getElementById('quantityDelta'),
        barcode: document.getElementById('barcode'),
        minusButton: document.getElementById('minusButton'),
        plusButton: document.getElementById('plusButton'),
        statusMessage: document.getElementById('statusMessage'),
        timestampValue: document.getElementById('timestampValue'),
        scannerModal: document.getElementById('scannerModal'),
        closeScannerButton: document.getElementById('closeScannerButton'),
        scannerShell: document.getElementById('scannerShell'),
        scannerNote: document.getElementById('scannerNote')
      };

      initialize();

      function initialize() {
        bindEvents();
        renderForm();
        syncActionButtons();
        bootstrap();
      }

      function bindEvents() {
        dom.scanButton.addEventListener('click', function () {
          unlockFeedback_();
          openScannerModal();
        });

        dom.closeScannerButton.addEventListener('click', function () {
          closeScannerModal();
        });

        dom.productName.addEventListener('input', function () {
          state.current.productName = dom.productName.value.trim();
          syncActionButtons();
        });

        dom.quantity.addEventListener('input', function () {
          state.current.quantity = normalizeQuantityInput(dom.quantity.value);
          dom.quantity.value = state.current.quantity;
          renderQuantityDelta();
          syncActionButtons();
        });

        dom.barcode.addEventListener('input', function () {
          state.current.barcode = cleanBarcode(dom.barcode.value);
          dom.barcode.value = state.current.barcode;
          syncActionButtons();
        });

        dom.barcode.addEventListener('keydown', function (event) {
          if (event.key !== 'Enter') {
            return;
          }

          event.preventDefault();
          lookupBarcode(dom.barcode.value, 'manual');
        });

        dom.minusButton.addEventListener('click', function () {
          adjustQuantity(-1);
        });

        dom.plusButton.addEventListener('click', function () {
          adjustQuantity(1);
        });

        dom.saveButton.addEventListener('click', function () {
          unlockFeedback_();
          saveCurrentRecord();
        });
      }

      function createRecord(overrides) {
        return Object.assign(
          {
            exists: false,
            rowNumber: null,
            barcode: '',
            productName: '',
            quantity: '',
            timestamp: ''
          },
          overrides || {}
        );
      }

      function normalizeRecord(record) {
        return createRecord({
          exists: Boolean(record && record.exists),
          rowNumber: record && record.rowNumber ? Number(record.rowNumber) : null,
          barcode: cleanBarcode(record && record.barcode),
          productName: (record && record.productName ? String(record.productName) : '').trim(),
          quantity: normalizeQuantityInput(record && record.quantity),
          timestamp: record && record.timestamp ? String(record.timestamp) : ''
        });
      }

      async function bootstrap() {
        setStatus('正在連線資料來源...', 'info');
        syncActionButtons();

        try {
          const response = await jsonpRequest('bootstrap');
          state.apiReady = true;
          setStatus(
            response.sheetName
              ? '已連線，工作表：' + response.sheetName + '，共 ' + String(response.itemCount || 0) + ' 筆。'
              : '已連線，可以開始掃描。',
            'success'
          );
        } catch (error) {
          state.apiReady = false;
          setStatus(error.message || '無法連線到 API', 'error');
        } finally {
          syncActionButtons();
        }
      }

      async function lookupBarcode(rawBarcode, source) {
        const barcode = cleanBarcode(rawBarcode);

        if (!barcode) {
          setStatus('請先輸入或掃描條碼。', 'warning');
          return;
        }

        if (!state.apiReady) {
          setStatus('資料來源尚未連線完成，請稍候。', 'warning');
          return;
        }

        try {
          const response = await jsonpRequest('lookup', { barcode: barcode });
          const record = response.record || createRecord({ barcode: barcode });

          applyRecord(record);
          setStatus(
            response.found
              ? source === 'scan'
                ? '掃描完成，已帶入既有品項。'
                : '已找到既有品項。'
              : '找不到此條碼，請輸入新商品名稱與數量。',
            response.found ? 'success' : 'warning'
          );
        } catch (error) {
          setStatus(error.message || '查詢失敗', 'error');
        }
      }

      function applyRecord(record) {
        const normalized = normalizeRecord(record);
        state.original = normalizeRecord(normalized);
        state.current = normalizeRecord(normalized);
        renderForm();
        syncActionButtons();
      }

      function renderForm() {
        dom.productName.value = state.current.productName;
        dom.quantity.value = state.current.quantity;
        dom.barcode.value = state.current.barcode;
        dom.timestampValue.textContent =
          '最後時間戳：' + formatTimestampForDisplay(state.current.timestamp);
        renderQuantityDelta();
      }

      function adjustQuantity(delta) {
        const current = Number(state.current.quantity || 0);
        const next = Math.max(0, current + delta);
        state.current.quantity = String(next);
        dom.quantity.value = state.current.quantity;
        renderQuantityDelta();
        syncActionButtons();
      }

      function renderQuantityDelta() {
        const originalQuantity = Number(state.original.quantity || 0);
        const currentQuantity = Number(state.current.quantity || 0);
        const difference = currentQuantity - originalQuantity;

        if (difference > 0) {
          dom.quantityDelta.textContent = '本次增加數量：' + difference;
          dom.quantityDelta.dataset.tone = 'success';
          return;
        }

        if (difference < 0) {
          dom.quantityDelta.textContent = '本次減少數量：' + Math.abs(difference);
          dom.quantityDelta.dataset.tone = 'warning';
          return;
        }

        dom.quantityDelta.textContent = '本次未變動數量';
        dom.quantityDelta.dataset.tone = 'info';
      }

      function cleanBarcode(value) {
        return String(value || '').replace(/\s+/g, '').trim();
      }

      function normalizeQuantityInput(value) {
        if (value === '' || value === null || value === undefined) {
          return '';
        }

        const numeric = Number(value);

        if (!Number.isFinite(numeric) || numeric < 0) {
          return '';
        }

        return String(Math.round(numeric));
      }

      function isDirty() {
        return (
          cleanBarcode(state.original.barcode) !== cleanBarcode(state.current.barcode) ||
          state.original.productName !== state.current.productName ||
          normalizeQuantityInput(state.original.quantity) !== normalizeQuantityInput(state.current.quantity)
        );
      }

      function isFormValid() {
        return Boolean(state.apiReady && cleanBarcode(state.current.barcode) && state.current.productName.trim());
      }

      function syncActionButtons() {
        dom.scanButton.disabled = !state.apiReady || state.scannerTransitioning || state.scannerOpen;
        dom.saveButton.disabled = state.saving || !isDirty() || !isFormValid();
      }

      async function saveCurrentRecord() {
        if (state.saving) {
          return;
        }

        state.current.productName = dom.productName.value.trim();
        state.current.quantity = normalizeQuantityInput(dom.quantity.value);
        state.current.barcode = cleanBarcode(dom.barcode.value);
        renderForm();
        syncActionButtons();

        if (!isFormValid()) {
          setStatus('請先補齊條碼與商品名稱。', 'warning');
          return;
        }

        state.saving = true;
        syncActionButtons();
        dom.saveButton.textContent = '儲存中...';
        unlockFeedback_();

        try {
          const barcodeChanged =
            Boolean(state.original.barcode) && state.current.barcode !== state.original.barcode;

          const result = await jsonpRequest('saveItem', {
            rowNumber: barcodeChanged ? '' : state.original.rowNumber || '',
            barcode: state.current.barcode,
            productName: state.current.productName,
            quantity: Number(state.current.quantity || 0)
          });

          applyRecord(result.record);
          setStatus(
            barcodeChanged || result.mode === 'created'
              ? '條碼已視為新商品新增到試算表，原條碼資料保持不變。'
              : '既有品項已更新到試算表。',
            'success'
          );
          playFeedback_('saveSuccess');
        } catch (error) {
          setStatus(error.message || '儲存失敗', 'error');
          playFeedback_('saveError');
        } finally {
          state.saving = false;
          dom.saveButton.textContent = '儲存變更';
          syncActionButtons();
        }
      }

      function jsonpRequest(action, params) {
        const callbackName =
          '__inventoryCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const url = new URL(GAS_WEB_APP_URL);
        url.searchParams.set('action', action);
        url.searchParams.set('callback', callbackName);
        url.searchParams.set('_ts', String(Date.now()));

        Object.entries(params || {}).forEach(function (entry) {
          const key = entry[0];
          const value = entry[1];
          if (value !== undefined && value !== null && value !== '') {
            url.searchParams.set(key, value);
          }
        });

        return new Promise(function (resolve, reject) {
          const script = document.createElement('script');
          const timeoutId = window.setTimeout(function () {
            cleanup();
            reject(new Error('API 請求逾時，請確認部署權限與網路連線。'));
          }, 12000);

          function cleanup() {
            delete window[callbackName];
            script.remove();
            window.clearTimeout(timeoutId);
          }

          window[callbackName] = function (response) {
            cleanup();
            if (!response || response.ok !== true) {
              reject(new Error((response && response.error) || 'API 回傳錯誤'));
              return;
            }

            resolve(response.data);
          };

          script.src = url.toString();
          script.async = true;
          script.onerror = function () {
            cleanup();
            reject(new Error('無法載入 API，請確認 GAS 仍可公開存取。'));
          };

          document.body.appendChild(script);
        });
      }

      function openScannerModal() {
        if (!state.apiReady || state.scannerOpen || state.scannerTransitioning) {
          return;
        }

        state.scannerOpen = true;
        dom.scannerModal.classList.add('is-open');
        dom.scannerModal.setAttribute('aria-hidden', 'false');
        dom.scannerNote.textContent = '正在準備掃描器...';
        syncActionButtons();
        startScanner();
      }

      async function closeScannerModal() {
        await stopScanner();
        dom.scannerModal.classList.remove('is-open');
        dom.scannerModal.setAttribute('aria-hidden', 'true');
        state.scannerOpen = false;
        syncActionButtons();
      }

      async function startScanner() {
        if (state.scannerTransitioning || state.scannerRunning) {
          return;
        }

        if (!window.BarcodeDetector && !window.Html5Qrcode && !window.ZXingBrowser) {
          setStatus('掃描模組尚未載入完成，請稍後再試。', 'error');
          dom.scannerNote.textContent = '掃描模組尚未載入完成。';
          await closeScannerModal();
          return;
        }

        try {
          state.scannerTransitioning = true;
          syncActionButtons();
          dom.scannerNote.textContent = '正在請求相機權限...';
          await startScannerWithFallback_();
          state.scannerRunning = true;
          dom.scannerShell.classList.add('is-active');
          dom.scannerNote.textContent =
            state.scannerEngine === 'native'
              ? '已啟動原生掃描引擎，請將條碼置中。'
              : state.scannerEngine === 'zxing'
              ? '已啟動 ZXing 掃描引擎，請將條碼置中。'
              : '已啟動相機，請將條碼置中。';
          setStatus('掃描器已啟動。', 'success');
        } catch (error) {
          const message = explainScannerError(error);
          setStatus(message, 'error');
          dom.scannerNote.textContent = message;
          await closeScannerModal();
        } finally {
          state.scannerTransitioning = false;
          syncActionButtons();
        }
      }

      async function stopScanner() {
        const readerRoot = document.getElementById('reader');

        if (!state.scannerRunning && !state.scannerEngine) {
          dom.scannerShell.classList.remove('is-active');
          dom.scannerNote.textContent = '掃描器已關閉。';
          if (readerRoot) {
            readerRoot.innerHTML = '';
          }
          return;
        }

        try {
          if (state.scannerEngine === 'native') {
            if (state.nativeScanFrame) {
              window.cancelAnimationFrame(state.nativeScanFrame);
            }
            if (state.nativeVideo) {
              state.nativeVideo.pause();
              state.nativeVideo.srcObject = null;
            }
            if (state.nativeStream) {
              state.nativeStream.getTracks().forEach(function (track) {
                track.stop();
              });
            }
          } else if (state.scannerEngine === 'html5' && state.scannerInstance) {
            await state.scannerInstance.stop();
            if (typeof state.scannerInstance.clear === 'function') {
              await state.scannerInstance.clear();
            }
          } else if (state.scannerEngine === 'zxing') {
            if (state.zxingControls) {
              state.zxingControls.stop();
            }
            if (state.zxingReader && typeof state.zxingReader.reset === 'function') {
              state.zxingReader.reset();
            }
          }
        } catch (error) {
          // 忽略快速關閉時的 stop 例外。
        } finally {
          state.scannerRunning = false;
          state.scannerEngine = '';
          state.scannerInstance = null;
          state.nativeDetector = null;
          state.nativeStream = null;
          state.nativeVideo = null;
          state.nativeCanvas = null;
          state.nativeContext = null;
          state.nativeDetecting = false;
          state.nativeScanFrame = 0;
          state.zxingReader = null;
          state.zxingControls = null;
          state.scannerHandlingResult = false;
          dom.scannerShell.classList.remove('is-active');
          dom.scannerNote.textContent = '掃描器已關閉。';
          if (readerRoot) {
            readerRoot.innerHTML = '';
          }
        }
      }

      async function startScannerWithFallback_() {
        let nativeError = null;
        let html5Error = null;

        if (window.BarcodeDetector && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          try {
            await startNativeScanner_();
            state.scannerEngine = 'native';
            return;
          } catch (error) {
            nativeError = error;
          }
        }

        if (window.Html5Qrcode && window.Html5QrcodeSupportedFormats) {
          try {
            state.scannerInstance = new Html5Qrcode('reader');

            await state.scannerInstance.start(
              {
                facingMode: { ideal: 'environment' },
                width: { ideal: 960 },
                height: { ideal: 540 },
                frameRate: { ideal: 30, max: 30 }
              },
              {
                fps: 28,
                qrbox: { width: 248, height: 76 },
                aspectRatio: 1.6,
                disableFlip: true,
                rememberLastUsedCamera: true,
                experimentalFeatures: {
                  useBarCodeDetectorIfSupported: true
                },
                formatsToSupport: [
                  Html5QrcodeSupportedFormats.CODE_128,
                  Html5QrcodeSupportedFormats.EAN_13,
                  Html5QrcodeSupportedFormats.UPC_A,
                  Html5QrcodeSupportedFormats.EAN_8,
                  Html5QrcodeSupportedFormats.UPC_E
                ]
              },
              onScanSuccess
            );

            state.scannerEngine = 'html5';
            return;
          } catch (error) {
            html5Error = error;
          }
        }

        if (window.ZXingBrowser) {
          await startZxingScanner_();
          state.scannerEngine = 'zxing';
          return;
        }

        throw nativeError || html5Error || new Error('找不到可用的掃描引擎。');
      }

      async function startNativeScanner_() {
        const readerRoot = document.getElementById('reader');
        readerRoot.innerHTML = '';

        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('muted', 'true');
        video.setAttribute('autoplay', 'true');
        video.style.width = '100%';
        video.style.height = '320px';
        video.style.objectFit = 'cover';
        video.style.borderRadius = '24px';
        readerRoot.appendChild(video);

        let formats = ['code_128', 'ean_13', 'upc_a', 'ean_8', 'upc_e'];

        if (typeof BarcodeDetector.getSupportedFormats === 'function') {
          const supportedFormats = await BarcodeDetector.getSupportedFormats();
          const filtered = formats.filter(function (format) {
            return supportedFormats.includes(format);
          });

          if (filtered.length) {
            formats = filtered;
          }
        }

        state.nativeDetector = new BarcodeDetector({ formats: formats });
        state.nativeStream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30, max: 30 }
          }
        });

        video.srcObject = state.nativeStream;
        state.nativeVideo = video;
        state.nativeCanvas = document.createElement('canvas');
        state.nativeContext = state.nativeCanvas.getContext('2d', {
          alpha: false,
          willReadFrequently: false
        });

        await video.play();

        const scanFrame = function () {
          if (state.scannerEngine !== 'native' || !state.nativeVideo || !state.nativeDetector) {
            return;
          }

          state.nativeScanFrame = window.requestAnimationFrame(scanFrame);

          if (state.nativeVideo.readyState < 2 || state.scannerHandlingResult) {
            return;
          }

          if (state.nativeDetecting) {
            return;
          }

          const videoWidth = state.nativeVideo.videoWidth || 0;
          const videoHeight = state.nativeVideo.videoHeight || 0;

          if (!videoWidth || !videoHeight || !state.nativeCanvas || !state.nativeContext) {
            return;
          }

          const cropWidth = Math.round(videoWidth * 0.64);
          const cropHeight = Math.round(videoHeight * 0.18);
          const cropX = Math.round((videoWidth - cropWidth) / 2);
          const cropY = Math.round((videoHeight - cropHeight) / 2);

          state.nativeCanvas.width = cropWidth;
          state.nativeCanvas.height = cropHeight;
          state.nativeContext.drawImage(
            state.nativeVideo,
            cropX,
            cropY,
            cropWidth,
            cropHeight,
            0,
            0,
            cropWidth,
            cropHeight
          );

          state.nativeDetecting = true;
          state.nativeDetector
            .detect(state.nativeCanvas)
            .then(function (codes) {
              if (!codes || !codes.length) {
                return;
              }

              const rawValue = codes[0] && codes[0].rawValue ? codes[0].rawValue : '';

              if (rawValue) {
                handleScanSuccess_(rawValue);
              }
            })
            .catch(function () {
              // Ignore transient detector errors and continue scanning.
            })
            .finally(function () {
              state.nativeDetecting = false;
            });
        };

        state.nativeScanFrame = window.requestAnimationFrame(scanFrame);
      }

      async function startZxingScanner_() {
        const readerRoot = document.getElementById('reader');
        readerRoot.innerHTML = '';

        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('muted', 'true');
        video.style.width = '100%';
        video.style.height = '320px';
        video.style.objectFit = 'cover';
        video.style.borderRadius = '24px';
        readerRoot.appendChild(video);

        state.zxingReader = new ZXingBrowser.BrowserMultiFormatReader();

        state.zxingControls = await state.zxingReader.decodeFromConstraints(
          {
            video: {
              facingMode: { ideal: 'environment' },
              width: { ideal: 960 },
              height: { ideal: 540 },
              frameRate: { ideal: 30, max: 30 }
            }
          },
          video,
          function (result, error, controls) {
            if (result && typeof result.getText === 'function') {
              handleScanSuccess_(result.getText());
            }

            if (controls && !state.zxingControls) {
              state.zxingControls = controls;
            }
          }
        );
      }

      function onScanSuccess(decodedText) {
        handleScanSuccess_(decodedText);
      }

      function handleScanSuccess_(decodedText) {
        const barcode = cleanBarcode(decodedText);
        const now = Date.now();

        if (!barcode || state.scannerHandlingResult) {
          return;
        }

        if (state.lastScannedCode === barcode && now - state.lastScanAt < 900) {
          return;
        }

        state.scannerHandlingResult = true;
        state.lastScannedCode = barcode;
        state.lastScanAt = now;
        playFeedback_('scanSuccess');
        lookupBarcode(barcode, 'scan').finally(function () {
          state.scannerHandlingResult = false;
        });
        closeScannerModal();
      }

      function unlockFeedback_() {
        if (!window.AudioContext) {
          return;
        }

        try {
          if (!state.audioContext) {
            state.audioContext = new AudioContext();
          }

          if (state.audioContext.state === 'suspended') {
            state.audioContext.resume();
          }

          if (!state.audioGainNode) {
            state.audioGainNode = state.audioContext.createGain();
            state.audioGainNode.gain.value = 8;
            state.audioGainNode.connect(state.audioContext.destination);
          }

          const buffer = state.audioContext.createBuffer(1, 1, 22050);
          const source = state.audioContext.createBufferSource();
          source.buffer = buffer;
          source.connect(state.audioGainNode || state.audioContext.destination);
          source.start(0);
        } catch (error) {
          state.audioContext = null;
          state.audioGainNode = null;
        }
      }

      function playFeedback_(kind) {
        if (state.audioContext && state.audioContext.state === 'suspended') {
          try {
            state.audioContext.resume();
          } catch (error) {
            return;
          }
        }

        try {
          if (navigator.vibrate) {
            if (kind === 'scanSuccess') {
              navigator.vibrate(35);
            } else if (kind === 'saveSuccess') {
              navigator.vibrate([25, 35, 25]);
            } else if (kind === 'saveError') {
              navigator.vibrate([60, 40, 60]);
            }
          }
        } catch (error) {
          // Ignore vibration failures.
        }

        if (!state.audioContext) {
          return;
        }

        const tones = {
          scanSuccess: [
            [988, 0.06, 'triangle'],
            [1396, 0.1, 'triangle']
          ],
          saveSuccess: [
            [880, 0.08, 'triangle'],
            [1174, 0.11, 'triangle'],
            [1567, 0.14, 'triangle']
          ],
          saveError: [
            [280, 0.16, 'sawtooth'],
            [196, 0.18, 'sawtooth']
          ]
        };

        const pattern = tones[kind];

        if (!pattern || !pattern.length) {
          return;
        }

        const context = state.audioContext;
        const startAt = context.currentTime + 0.01;

        pattern.forEach(function (tone, index) {
          const frequency = tone[0];
          const duration = tone[1];
          const type = tone[2];
          const oscillator = context.createOscillator();
          const gainNode = context.createGain();
          const noteStart = startAt + index * 0.1;

          oscillator.type = type;
          oscillator.frequency.setValueAtTime(frequency, noteStart);
          gainNode.gain.setValueAtTime(0.0001, noteStart);
          gainNode.gain.exponentialRampToValueAtTime(0.42, noteStart + 0.012);
          gainNode.gain.exponentialRampToValueAtTime(0.0001, noteStart + duration);

          oscillator.connect(gainNode);
          gainNode.connect(state.audioGainNode || context.destination);
          oscillator.start(noteStart);
          oscillator.stop(noteStart + duration + 0.02);
        });
      }

      function setStatus(message, tone) {
        dom.statusMessage.textContent = message;
        dom.statusMessage.dataset.tone = tone || 'info';
      }

      function explainScannerError(error) {
        const message = String((error && error.message) || error || '');

        if (/permission|denied|notallowed/i.test(message)) {
          return '相機權限被拒絕，請確認是用 iPhone Safari 打開並允許相機。';
        }

        if (/already under transition/i.test(message)) {
          return '掃描器仍在切換狀態，請再試一次。';
        }

        if (/notfound|camera|device/i.test(message)) {
          return '找不到可用相機，請確認裝置相機正常。';
        }

        return message || '無法啟動相機。';
      }

      function formatTimestampForDisplay(timestamp) {
        if (!timestamp) {
          return '未記錄';
        }

        const date = new Date(timestamp);

        if (Number.isNaN(date.getTime())) {
          return timestamp;
        }

        return new Intl.DateTimeFormat('zh-TW', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        }).format(date);
      }
    </script>
  </body>
</html>
